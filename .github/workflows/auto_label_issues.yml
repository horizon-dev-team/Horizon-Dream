name: Auto-Label - Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  process-labels:
    runs-on: ubuntu-latest
    if: github.event.issue.state == 'open'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate App Token
        id: app-token-generation
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Parse and add labels based on checkboxes
        id: process_issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token-generation.outputs.token }}
          script: |
            const { processIssueLabelsAndBody } = await import('${{ github.workspace }}/tools/pull_request_hooks/autoLabelIssues.js');
            return await processIssueLabelsAndBody({ github, context, core });

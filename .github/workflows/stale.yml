name: Stale - Mark stale issues and pull requests

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  stale:
    permissions:
      issues: write # for actions/stale to close stale issues
      pull-requests: write # for actions/stale to close stale PRs
    runs-on: ubuntu-24.04
    outputs:
      staled_prs: ${{ steps.filter-prs.outputs.result }}

    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v10
        id: stale
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-pr-message: >
            Этот PR был автоматически помечен как застоявшийся из-за длительного отсутствия обновлений и обсуждения. Он будет закрыт через ~7 дней, если не будет проявлено никакой активности.
            Если вы считаете, что PR всё ещё актуален — просто оставьте любой комментарий.
            Попробуйте связаться с мейнтейнерами, если они по какой-то причине игнорируют PR или у вас есть вопросы.
            Спасибо за ваш вклад!
          stale-issue-message: >
            Данное предложение пробыло без активности более полугода. Если вы найдёте того, кто его реализует,
            и вам нужно открыть этот ишью повторно - пожалуйста, обратитесь к кому-либо из мейнтейнеров.
            Для этого оставьте комментарий с упоминанием @horizon-dev-team/HORIZON-TEAM.
          days-before-stale: 23
          days-before-close: 7
          days-before-issue-stale: 200
          days-before-issue-close: 1
          stale-pr-label: "Stale"
          stale-issue-label: "Stale"
          any-of-issue-labels: "Cleanup Flagged,🤖 Flaky Test Report"
          remove-issue-stale-when-updated: false
          exempt-issue-labels: "RED LABEL"
          exempt-pr-labels: "RED LABEL"
          operations-per-run: 300
      - name: Filter staled pull requests for announcement
        id: filter-prs
        uses: actions/github-script@v8
        with:
          script: |
            return JSON.parse(`${{steps.stale.outputs.staled-issues-prs}}`)
                       .filter(issue => !!issue.pull_request)
                       .map(pr => ({
                        title: pr.title,
                        number: pr.number,
                        html_url: pr.pull_request.html_url,
                       }));

  announce:
    runs-on: ubuntu-24.04
    needs: stale
    if: ${{ needs.stale.outputs.staled_prs != '[]' }}
    strategy:
      matrix:
        pull_request: ${{ fromJSON(needs.stale.outputs.staled_prs) }}
    steps:
      - name: "Check for DISCORD_WEBHOOK"
        id: secrets_set
        env:
          ENABLER_SECRET: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          unset SECRET_EXISTS
          if [ -n "$ENABLER_SECRET" ]; then SECRET_EXISTS=true ; fi
          echo "SECRETS_ENABLED=$SECRET_EXISTS" >> $GITHUB_OUTPUT
      - name: Send Discord notification
        uses: tgstation/discord-notify@v3
        if: >
          steps.secrets_set.outputs.SECRETS_ENABLED
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          title: ${{ matrix.pull_request.title }}
          message: ${{ format('**Pull Request \#{0} automatically marked as stale.**', matrix.pull_request.number) }}
          include_image: false
          show_author: false
          avatar_url: https://avatars.githubusercontent.com/u/1363778?s=200&v=4
          username: GitHub
          title_url: "${{ matrix.pull_request.html_url }}"

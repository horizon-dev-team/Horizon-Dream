name: "💰 Баунти / Запрос на реализацию"
description: "Предложите вознаграждение за реализацию фичи, спрайта или механики"
title: "[БАУНТИ]: "
type: $ Баунти $
body:
  - type: markdown
    attributes:
      value: |
        ## Называйте заголовок кратко и понятно:
        ### ПРИМЕР: `[БАУНТИ]: Рыбалка - Набор удочек в карго`

  - type: checkboxes
    id: feature_scope
    attributes:
      label: "Что потребует изменений?"
      description: "Выберите типы изменений"
      options:
        - label: "🧱 Код"
        - label: "🎨 Спрайты"
        - label: "🗺 Карты"

  - type: textarea
    id: description
    attributes:
      label: "Описание"
      description: "Опишите свой магнум-опус"
      placeholder: |
        **Суть:** Система крафта кастомных подов в доке

        **Детали:**
        - Новая консоль в доках: 'Конструктор подов'
        - Интерфейс как у экзо-фабрики: выбираешь корпус (малый/средний/тяжелый), двигатели, вооружение, щиты, краску
        - Крафт через карго: заказываешь модули, собираешь на стапеле (как мехи)
        - Готовый под управляется как обычный (WASD, клик для стрельбы)
        - Пример сборки: корпус 'Сокол' + плазменный двигатель + лазерная пушка + легкие щиты = разведчик

        **Плюсы:** Кастомизация для пилотов, новый контент для карго и инженеров, реиграбельность

        **Минусы:** Сложность реализации GUI, баласнс модулей, нагрузка на сервер от кастомных объектов
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: "Материалы"
      description: "Референсы, скетчи, ссылки"
      placeholder: "Можно прикрепить изображения или указать ссылки"
    validations:
      required: false

  - type: input
    id: price
    attributes:
      label: "Стоимость"
      description: "💰 Сколько готовы заплатить"
      placeholder: "500 руб / 5$"
    validations:
      required: true
